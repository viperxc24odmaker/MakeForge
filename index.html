<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MakeForge — Build · Ship · Forge</title>
<style>
  :root{
    --bg:#17130f;
    --bg-soft:#221c16;
    --card:#1e1813;
    --line:#332a22;
    --text:#f4efe9;
    --muted:#9a8d80;
    --orange:#f26a1b;
    --orange-soft:#ff8a3d;
    --mono:'SF Mono',ui-monospace,'Cascadia Code','Roboto Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 28px}

  nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 0;border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:20px;letter-spacing:-.02em}
  nav .links{display:flex;gap:26px;font-family:var(--mono);font-size:12px;letter-spacing:.15em;text-transform:uppercase}
  nav .links a{color:var(--muted);text-decoration:none;transition:color .2s}
  nav .links a:hover{color:var(--orange)}

  header{padding:90px 0 70px;text-align:center}
  .cube{width:118px;height:118px;margin:0 auto 30px;filter:drop-shadow(0 14px 30px rgba(242,106,27,.28))}
  .wordmark{font-size:clamp(44px,9vw,84px);font-weight:800;letter-spacing:-.03em;line-height:1}
  .wordmark .make{color:var(--text)}
  .wordmark .forge{color:var(--orange)}
  .tagline{
    font-family:var(--mono);font-size:13px;letter-spacing:.42em;
    color:var(--muted);margin-top:20px;text-transform:uppercase;
  }
  .tagline b{color:var(--orange-soft);font-weight:400}
  .intro{max-width:540px;margin:34px auto 0;color:var(--muted);font-size:17px}
  .cta{display:flex;gap:14px;justify-content:center;margin-top:38px;flex-wrap:wrap}
  .btn{
    font-family:var(--mono);font-size:12px;letter-spacing:.15em;text-transform:uppercase;
    padding:13px 26px;border-radius:8px;text-decoration:none;transition:all .2s;border:1px solid transparent;
  }
  .btn-primary{background:var(--orange);color:#17130f;font-weight:600}
  .btn-primary:hover{background:var(--orange-soft)}
  .btn-ghost{border-color:var(--line);color:var(--text)}
  .btn-ghost:hover{border-color:var(--orange);color:var(--orange)}

  .label{font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-bottom:26px}

  section{padding:70px 0;border-top:1px solid var(--line)}

  .empty-work{
    border:1px dashed var(--line);border-radius:14px;
    padding:60px 30px;text-align:center;color:var(--muted);
  }
  .empty-work p{font-size:15px}
  .empty-work .soon{
    font-family:var(--mono);font-size:11px;letter-spacing:.2em;
    color:var(--orange);text-transform:uppercase;margin-bottom:10px;
  }

  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}
  .about-grid h2{font-size:30px;letter-spacing:-.02em;line-height:1.25}
  .about-grid h2 span{color:var(--orange)}
  .about-grid p{color:var(--muted);font-size:16px}

  .contact{text-align:center}
  .contact
